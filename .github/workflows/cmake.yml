name: cmake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  macos:
    name: macOS • ${{ matrix.compiler }} • ${{ matrix.variant == 'cxx23' && 'C++23 tests' || matrix.build-type }}
    runs-on: macos-15
    strategy:
        fail-fast: false
        matrix:
            compiler: ["appleclang", "llvm@20", "llvm@21", "llvm"]
            build-type: ["debug", "release"]
            variant: ["default"]
            include:
              - compiler: "llvm@20"
                build-type: "debug"
                variant: "cxx23"
                test_cxx_standard: "23"
                enable_package_tests: "ON"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2 toolchain
        if: matrix.compiler == 'appleclang'
        run: |
          # Use Xcode 16.2 (has Apple Clang 16/AppleClang 26)
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer
          else
            sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          if [ "${{ matrix.compiler }}" = "llvm@20" ]; then
            brew install llvm@20 ninja ccache
          elif [ "${{ matrix.compiler }}" = "llvm@21" ]; then
            brew install llvm@21 ninja ccache
          else
            brew install llvm ninja ccache
          fi
          echo "$(brew --prefix ninja)/bin" >> $GITHUB_PATH

      - name: Configure LLVM environment
        run: |
          if [ "${{ matrix.compiler }}" = "llvm@20" ]; then
            LLVM_PREFIX="$(brew --prefix llvm@20)"
          elif [ "${{ matrix.compiler }}" = "llvm@21" ]; then
            LLVM_PREFIX="$(brew --prefix llvm@21)"
          else
            LLVM_PREFIX="$(brew --prefix llvm)"
          fi
          echo "LLVM_DIR=${LLVM_PREFIX}/lib/cmake/llvm" >> $GITHUB_ENV
          echo "PATH=${LLVM_PREFIX}/bin:$PATH" >> $GITHUB_ENV
          if [ "${{ matrix.compiler }}" = "llvm" ] || [ "${{ matrix.compiler }}" = "llvm@21" ] || [ "${{ matrix.compiler }}" = "llvm@20" ]; then
            echo "LLVM_BIN=${LLVM_PREFIX}/bin" >> $GITHUB_ENV
          fi

      - name: Configure environment
        run: |
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "CCACHE_DISABLE=1" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Show tool versions
        run: |
          cmake --version
          command -v ninja
          ninja --version
          COMPILER_BIN="${LLVM_BIN:-/usr/bin}"
          "${COMPILER_BIN}/clang" --version

      - name: Setup vcpkg
        run: bash scripts/setup-vcpkg.sh

      - name: Configure
        run: |
          COMPILER_BIN="${LLVM_BIN:-/usr/bin}"
          CMAKE_ARGS=(
            "--preset=${{ matrix.build-type }}"
            "-DCMAKE_C_COMPILER=${COMPILER_BIN}/clang"
            "-DCMAKE_CXX_COMPILER=${COMPILER_BIN}/clang++"
            "-DCMAKE_MAKE_PROGRAM=$(command -v ninja)"
            "-DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="
          )
          if [ -n "${LLVM_DIR:-}" ]; then
            CMAKE_ARGS+=("-DLLVM_DIR=${LLVM_DIR}")
            # Also add Clang_DIR to find ClangConfig.cmake
            CLANG_DIR="$(dirname ${LLVM_DIR})/clang"
            if [ -f "${CLANG_DIR}/ClangConfig.cmake" ]; then
              CMAKE_ARGS+=("-DClang_DIR=${CLANG_DIR}")
            fi
          fi
          if [ -n "${LLVM_BIN:-}" ] && [ -x "${LLVM_BIN}/clang-scan-deps" ]; then
            CMAKE_ARGS+=("-DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS=${LLVM_BIN}/clang-scan-deps")
          fi
          if [ -n "${{ matrix.test_cxx_standard }}" ]; then
            CMAKE_ARGS+=("-DGENTEST_TEST_CXX_STANDARD=${{ matrix.test_cxx_standard }}")
          fi
          if [ -n "${{ matrix.enable_package_tests }}" ]; then
            CMAKE_ARGS+=("-DGENTEST_ENABLE_PACKAGE_TESTS=${{ matrix.enable_package_tests }}")
          fi
          cmake "${CMAKE_ARGS[@]}"

      - name: Build
        run: cmake --build --preset=${{ matrix.build-type }}

      - name: Test
        run: ctest --preset=${{ matrix.build-type }} --output-on-failure --parallel 4

  windows:
    name: Windows • LLVM ${{ matrix.llvm-version }} • ${{ matrix.variant == 'cxx23' && 'C++23 tests' || matrix.preset }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        llvm-version: ["22.1.0", "21.1.4", "20.1.8"]
        preset: ["debug-system", "release-system"]
        variant: ["default"]
        include:
          - llvm-version: "20.1.8"
            preset: "debug-system-cxx23"
            variant: "cxx23"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Install modern Ninja
        shell: pwsh
        run: |
          py -m pip install --user --upgrade ninja
          $scripts = py -c "import sysconfig; print(sysconfig.get_path('scripts'))"
          $scripts | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache extracted LLVM toolchain
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\llvm\clang+llvm-${{ matrix.llvm-version }}-x86_64-pc-windows-msvc
          key: llvm-${{ runner.os }}-${{ matrix.llvm-version }}

      - name: Download LLVM distribution (tarball)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = "${{ matrix.llvm-version }}"
          $archive = "clang+llvm-$version-x86_64-pc-windows-msvc.tar.xz"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/$archive"
          Invoke-WebRequest -Uri $url -OutFile $archive

      - name: Extract LLVM toolchain
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = "${{ matrix.llvm-version }}"
          $root = Join-Path $env:RUNNER_TEMP "llvm"
          $null = New-Item -ItemType Directory -Force -Path $root
          $archive = Get-Item "clang+llvm-$version-x86_64-pc-windows-msvc.tar.xz"

          # bsdtar extraction on windows runners is extremely slow; use 7-Zip instead.
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\\7z.exe"
          if (-not (Test-Path $sevenZip)) { $sevenZip = "7z.exe" }

          & $sevenZip x -y $archive.FullName "-o$root"
          $tarPath = Join-Path $root "clang+llvm-$version-x86_64-pc-windows-msvc.tar"
          if (-not (Test-Path $tarPath)) { throw "7-Zip failed to produce tar archive at $tarPath" }
          & $sevenZip x -y $tarPath "-o$root"

          Remove-Item -Force -ErrorAction SilentlyContinue $tarPath
          Remove-Item -Force -ErrorAction SilentlyContinue $archive.FullName

      - name: Configure LLVM environment
        shell: pwsh
        run: |
          $version = "${{ matrix.llvm-version }}"
          $root = Join-Path $env:RUNNER_TEMP "llvm"
          $extracted = Join-Path $root "clang+llvm-$version-x86_64-pc-windows-msvc"
          if (-not (Test-Path $extracted)) { throw "Failed to locate extracted LLVM directory at $extracted" }
          "$extracted\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LLVM_BIN=$extracted\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_DIR=$extracted\\lib\\cmake\\llvm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Clang_DIR=$extracted\\lib\\cmake\\clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          (Get-Command ninja).Source
          ninja --version
          & (Join-Path $env:LLVM_BIN "clang.exe") --version
          & (Join-Path $env:LLVM_BIN "clang++.exe") --version

      - name: Configure
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "--preset=${{ matrix.preset }}",
            "-DCMAKE_C_COMPILER=$env:LLVM_BIN\\clang.exe",
            "-DCMAKE_CXX_COMPILER=$env:LLVM_BIN\\clang++.exe",
            "-DCMAKE_MAKE_PROGRAM=$((Get-Command ninja).Source)",
            "-DLLVM_DIR=$env:LLVM_DIR",
            "-DClang_DIR=$env:Clang_DIR"
          )
          if ("${{ matrix.preset }}" -eq "debug-system") {
            $cmakeArgs += "-DGENTEST_SKIP_WINDOWS_DEBUG_DEATH_TESTS=ON"
          }
          cmake @cmakeArgs

      - name: Build
        shell: pwsh
        run: cmake --build --preset=${{ matrix.preset }}

      - name: Test
        shell: pwsh
        run: ctest --preset=${{ matrix.preset }} --output-on-failure --parallel 4

      - name: Configure/Build/Test (MSVC)
        if: matrix.preset == 'debug-system'
        shell: pwsh
        run: |
          # Also validate MSVC + LLVM tooling (Debug only).
          $msvcBuildDir = Join-Path $env:GITHUB_WORKSPACE "build\\debug-system-msvc"
          cmake -S . -B $msvcBuildDir -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DGENTEST_ENABLE_PACKAGE_TESTS=ON `
            -DGENTEST_SKIP_WINDOWS_DEBUG_DEATH_TESTS=ON `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -DClang_DIR="$env:Clang_DIR"
          cmake --build $msvcBuildDir
          ctest --test-dir $msvcBuildDir --output-on-failure --parallel 4

  linux:
    name: ${{ matrix.name }} • ${{ matrix.preset == 'debug-system-cxx23' && 'C++23 tests' || matrix.build_type }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04 • Clang 20
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: coverage
            preset: coverage-system
            run_coverage: true
            ctest_parallel: 1
          - name: Ubuntu 24.04 • Clang 20
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: ASan+UBSan
            preset: alusan-system
            ctest_parallel: 2
          - name: Ubuntu 24.04 • Clang 20
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: TSan
            preset: tsan-system
            ctest_parallel: 2
          - name: Ubuntu 24.04 • Clang 20
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: release
          - name: Ubuntu 24.04 • Clang 20
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: debug
            preset: debug-system-cxx23
          - name: Ubuntu 24.04 • GCC
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: gcc
            cc: gcc
            cxx: g++
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: debug
          - name: Ubuntu 24.04 • GCC
            container: ubuntu:24.04
            pkg_manager: apt
            compiler: gcc
            cc: gcc
            cxx: g++
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: release
          - name: Ubuntu 25.04 • Clang 20
            container: ubuntu:25.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: debug
          - name: Ubuntu 25.04 • Clang 20
            container: ubuntu:25.04
            pkg_manager: apt
            compiler: clang
            cc: clang-20
            cxx: clang++-20
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: release
          - name: Ubuntu 25.04 • GCC
            container: ubuntu:25.04
            pkg_manager: apt
            compiler: gcc
            cc: gcc
            cxx: g++
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: debug
          - name: Ubuntu 25.04 • GCC
            container: ubuntu:25.04
            pkg_manager: apt
            compiler: gcc
            cc: gcc
            cxx: g++
            clang_version: "20"
            llvm_dir: /usr/lib/llvm-20/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-20/lib/cmake/clang
            build_type: release
          - name: Ubuntu 24.04 • LLVM 22
            container: ubuntu:24.04
            pkg_manager: apt
            setup_mode: apt-llvm-org
            compiler: clang
            cc: clang-22
            cxx: clang++-22
            clang_version: "22"
            llvm_dir: /usr/lib/llvm-22/lib/cmake/llvm
            clang_dir: /usr/lib/llvm-22/lib/cmake/clang
            build_type: debug
          # Prefer pinned Alpine releases over `alpine:latest` so the
          # LLVM/Clang package names and CMake package paths remain stable.
          - name: Alpine 3.21 • Clang 19
            container: alpine:3.21
            pkg_manager: apk
            compiler: clang
            cc: clang-19
            cxx: clang++-19
            llvm_version: "19"
            llvm_dir: /usr/lib/cmake/llvm19
            clang_dir: /usr/lib/cmake/clang19
            build_type: debug
            codegen_jobs: 2
          - name: Alpine 3.21 • Clang 19
            container: alpine:3.21
            pkg_manager: apk
            compiler: clang
            cc: clang-19
            cxx: clang++-19
            llvm_version: "19"
            llvm_dir: /usr/lib/cmake/llvm19
            clang_dir: /usr/lib/cmake/clang19
            build_type: release
            codegen_jobs: 2
          - name: Alpine 3.23 • Clang 21
            container: alpine:3.23
            pkg_manager: apk
            compiler: clang
            cc: clang-21
            cxx: clang++-21
            llvm_version: "21"
            llvm_dir: /usr/lib/cmake/llvm21
            clang_dir: /usr/lib/cmake/clang21
            build_type: debug
            codegen_jobs: 2
          - name: Alpine 3.23 • Clang 21
            container: alpine:3.23
            pkg_manager: apk
            compiler: clang
            cc: clang-21
            cxx: clang++-21
            llvm_version: "21"
            llvm_dir: /usr/lib/cmake/llvm21
            clang_dir: /usr/lib/cmake/clang21
            build_type: release
            codegen_jobs: 2
          - name: Fedora 41 • Clang
            container: fedora:41
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 41 • Clang
            container: fedora:41
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 41 • GCC
            container: fedora:41
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 41 • GCC
            container: fedora:41
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 42 • Clang
            container: fedora:42
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 42 • Clang
            container: fedora:42
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 42 • GCC
            container: fedora:42
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 42 • GCC
            container: fedora:42
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 43 • Clang
            container: fedora:43
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 43 • Clang
            container: fedora:43
            pkg_manager: dnf
            compiler: clang
            cc: clang
            cxx: clang++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 43 • GCC
            container: fedora:43
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: debug
          - name: Fedora 43 • GCC
            container: fedora:43
            pkg_manager: dnf
            compiler: gcc
            cc: gcc
            cxx: g++
            llvm_dir: /usr/lib64/cmake/llvm
            clang_dir: /usr/lib64/cmake/clang
            build_type: release
          - name: Fedora 43 • LLVM 22
            container: fedora:43
            pkg_manager: dnf
            setup_mode: upstream-archive
            llvm_release: "22.1.0"
            compiler: clang
            cc: /opt/llvm-22.1.0/bin/clang
            cxx: /opt/llvm-22.1.0/bin/clang++
            llvm_dir: /opt/llvm-22.1.0/lib/cmake/llvm
            clang_dir: /opt/llvm-22.1.0/lib/cmake/clang
            build_type: debug
    steps:
      - name: Update and install dependencies (apt)
        if: ${{ matrix.pkg_manager == 'apt' }}
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            build-essential \
            ccache \
            ninja-build \
            python3 \
            python3-pip \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            ca-certificates \
            gnupg \
            libffi-dev \
            libxml2-dev \
            zlib1g-dev \
            libzstd-dev \
            libcurl4-openssl-dev \
            libunwind-dev \
            libfmt-dev
          if [ "${{ matrix.setup_mode }}" = "apt-llvm-org" ]; then
            curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
            printf '%s\n' \
              'Types: deb' \
              'URIs: https://apt.llvm.org/noble/' \
              'Suites: llvm-toolchain-noble-22' \
              'Components: main' \
              'Signed-By: /etc/apt/trusted.gpg.d/apt.llvm.org.asc' \
              >/etc/apt/sources.list.d/apt-llvm-22.sources
            apt-get update
          fi
          apt-get install -y --no-install-recommends \
            clang-${{ matrix.clang_version }} \
            clang-tools-${{ matrix.clang_version }} \
            libclang-${{ matrix.clang_version }}-dev \
            libclang-rt-${{ matrix.clang_version }}-dev \
            libclang-cpp${{ matrix.clang_version }}-dev \
            llvm-${{ matrix.clang_version }}-dev
          python3 -m pip install --break-system-packages --upgrade cmake ninja
          python3 - <<'PY' >> "$GITHUB_PATH"
          import sysconfig
          print(sysconfig.get_path("scripts"))
          PY
          echo "/usr/lib/llvm-${{ matrix.clang_version }}/bin" >> "$GITHUB_PATH"
      - name: Update and install dependencies (dnf)
        if: ${{ matrix.pkg_manager == 'dnf' }}
        run: |
          set -euxo pipefail
          dnf -y upgrade --refresh
          if [ "${{ matrix.setup_mode }}" = "upstream-archive" ]; then
            dnf -y install \
              git \
              which \
              tar \
              xz \
              ccache \
              ninja-build \
              python3 \
              python3-pip \
              pkg-config \
              curl \
              zip \
              unzip \
              fmt-devel \
              zlib-ng-compat-devel \
              libunwind-devel \
              libcurl-devel \
              libffi-devel \
              libxml2-devel \
              gcc \
              gcc-c++ \
              make \
              ca-certificates \
              ncurses-compat-libs
            curl -L --fail -o /tmp/LLVM-${{ matrix.llvm_release }}-Linux-X64.tar.xz \
              https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ matrix.llvm_release }}/LLVM-${{ matrix.llvm_release }}-Linux-X64.tar.xz
            mkdir -p /opt/llvm-${{ matrix.llvm_release }}
            tar -xf /tmp/LLVM-${{ matrix.llvm_release }}-Linux-X64.tar.xz -C /opt/llvm-${{ matrix.llvm_release }} --strip-components=1
            echo "/opt/llvm-${{ matrix.llvm_release }}/bin" >> "$GITHUB_PATH"
          else
            dnf -y install \
              git \
              which \
              tar \
              xz \
              ccache \
              ninja-build \
              python3 \
              python3-pip \
              pkg-config \
              curl \
              zip \
              unzip \
              clang \
              clang-libs \
              clang-devel \
              clang-tools-extra \
              llvm-devel \
              fmt-devel \
              zlib-ng-compat-devel \
              libunwind-devel \
              libcurl-devel \
              libffi-devel \
              libxml2-devel \
              gcc \
              gcc-c++ \
              make \
              ca-certificates \
              ncurses-compat-libs
          fi
          python3 -m pip install --upgrade pip cmake ninja
          python3 - <<'PY' >> "$GITHUB_PATH"
          import sysconfig
          print(sysconfig.get_path("scripts"))
          PY
      - name: Update and install dependencies (apk)
        if: ${{ matrix.pkg_manager == 'apk' }}
        shell: sh
        run: |
          set -eux
          apk update
          # Alpine splits files referenced by LLVM/Clang's CMake exports across
          # the base, -static, -gtest, and -extra-tools packages.
          apk add --no-cache \
            bash \
            build-base \
            ca-certificates \
            ccache \
            clang${{ matrix.llvm_version }} \
            clang${{ matrix.llvm_version }}-dev \
            clang${{ matrix.llvm_version }}-extra-tools \
            clang${{ matrix.llvm_version }}-static \
            cmake \
            curl \
            fmt-dev \
            git \
            libffi-dev \
            libxml2-dev \
            linux-headers \
            llvm${{ matrix.llvm_version }} \
            llvm${{ matrix.llvm_version }}-dev \
            llvm${{ matrix.llvm_version }}-gtest \
            llvm${{ matrix.llvm_version }}-static \
            ninja \
            py3-pip \
            pkgconf \
            python3 \
            tar \
            unzip \
            xz \
            zip \
            zlib-dev \
            zstd-dev
          python3 -m pip install --break-system-packages --upgrade ninja || python3 -m pip install --upgrade ninja
          python3 - <<'PY' >> "$GITHUB_PATH"
          import sysconfig
          print(sysconfig.get_path("scripts"))
          PY
          echo "/usr/lib/llvm${{ matrix.llvm_version }}/bin" >> "$GITHUB_PATH"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure environment variables
        run: |
          echo "LLVM_DIR=${{ matrix.llvm_dir }}" >> $GITHUB_ENV
          echo "Clang_DIR=${{ matrix.clang_dir }}" >> $GITHUB_ENV
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV
          echo "GENTEST_CODEGEN_JOBS=${{ matrix.codegen_jobs }}" >> $GITHUB_ENV
          echo "GENTEST_CMAKE_PRESET=${{ matrix.preset || (matrix.build_type == 'debug' && 'debug-system' || 'release-system') }}" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV
      - name: Show tool versions
        run: |
          set -euxo pipefail
          cmake --version
          command -v ninja
          ninja --version
          ${CC} --version
          clang --version || true
          if command -v llvm-config >/dev/null 2>&1; then llvm-config --version; fi
      - name: Configure
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          set -euxo pipefail
          CMAKE_ARGS=(
            "--preset=${GENTEST_CMAKE_PRESET}"
            "-DCMAKE_C_COMPILER=${CC}"
            "-DCMAKE_CXX_COMPILER=${CXX}"
            "-DCMAKE_MAKE_PROGRAM=$(command -v ninja)"
            "-DLLVM_DIR=${LLVM_DIR}"
            "-DClang_DIR=${Clang_DIR}"
          )
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            scan_deps=""
            for candidate in \
              "${CXX/clang++/clang-scan-deps}" \
              "clang-scan-deps-${{ matrix.clang_version }}" \
              "clang-scan-deps-${{ matrix.llvm_version }}" \
              "clang-scan-deps"
            do
              if [ -n "$candidate" ] && command -v "$candidate" >/dev/null 2>&1; then
                scan_deps="$(command -v "$candidate")"
                break
              fi
            done
            if [ -n "$scan_deps" ]; then
              CMAKE_ARGS+=("-DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS=${scan_deps}")
            fi
          fi
          cmake "${CMAKE_ARGS[@]}"
      - name: Build
        run: |
          set -euxo pipefail
          cmake --build --preset=${GENTEST_CMAKE_PRESET} --parallel
      - name: "Coverage: reset coverage artifacts"
        if: ${{ matrix.run_coverage == true }}
        run: |
          set -euxo pipefail
          if [ -d "build/${GENTEST_CMAKE_PRESET}" ]; then
            find "build/${GENTEST_CMAKE_PRESET}" -name '*.gcda' -delete
          fi
      - name: Test
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          set -euxo pipefail
          ctest --preset=${GENTEST_CMAKE_PRESET} --output-on-failure --parallel ${{ matrix.ctest_parallel || 4 }}
      - name: Coverage hygiene (codegen + runtime)
        if: ${{ matrix.run_coverage == true }}
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          set -euxo pipefail
          python3 scripts/coverage_hygiene.py \
            --build-dir "build/${GENTEST_CMAKE_PRESET}" \
            --ignore-statuses stamp_mismatch \
            --gcov llvm-cov gcov

  package-workflow:
    name: Package Workflow
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Install dependencies
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            ninja-build \
            python3 \
            python3-pip \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            ca-certificates \
            gnupg \
            libffi-dev \
            libxml2-dev \
            zlib1g-dev \
            libzstd-dev \
            libcurl4-openssl-dev \
            libunwind-dev \
            libfmt-dev
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.llvm.org/noble/' \
            'Suites: llvm-toolchain-noble-20' \
            'Components: main' \
            'Signed-By: /etc/apt/trusted.gpg.d/apt.llvm.org.asc' \
            | sudo tee /etc/apt/sources.list.d/apt-llvm-20.sources >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-20 \
            clang-tools-20 \
            libclang-20-dev \
            libclang-cpp20-dev \
            llvm-20-dev
          python3 -m pip install --break-system-packages --upgrade cmake ninja
          python3 - <<'PY' >> "$GITHUB_PATH"
          import sysconfig
          print(sysconfig.get_path("scripts"))
          PY
          echo "/usr/lib/llvm-20/bin" >> "$GITHUB_PATH"
          echo "LLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm" >> "$GITHUB_ENV"
          echo "Clang_DIR=/usr/lib/llvm-20/lib/cmake/clang" >> "$GITHUB_ENV"
          echo "CC=clang-20" >> "$GITHUB_ENV"
          echo "CXX=clang++-20" >> "$GITHUB_ENV"

      - name: Setup vcpkg
        run: bash scripts/setup-vcpkg.sh

      - name: Show tool versions
        run: |
          set -euxo pipefail
          cmake --version
          ninja --version
          clang-20 --version
          clang++-20 --version

      - name: Run package workflow
        run: |
          set -euxo pipefail
          cmake --workflow --preset=package
